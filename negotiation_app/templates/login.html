{% extends 'base.html' %}
{% block title %}Login - NegotioCart{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-4 p-4 mt-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Welcome Back</h3>
                    <p class="text-muted">Login to start shopping and negotiating</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold text-secondary">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control rounded-3" placeholder="Enter username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-semibold text-secondary">Password</label>
                        <input type="password" name="password" id="id_password" class="form-control rounded-3" placeholder="Enter password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-info text-white w-100 rounded-3 py-2 fw-semibold mt-3">
                        <i class="fa-solid fa-right-to-bracket me-2"></i>Login
                    </button>
                </form>
                
                <hr class="text-secondary my-4">
                
                <div class="text-center">
                    <p class="mb-0 text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-info fw-semibold text-decoration-none">Register Here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
